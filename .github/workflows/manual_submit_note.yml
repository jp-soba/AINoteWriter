name: Manual Note Submit

on:
  workflow_dispatch:
    inputs:
      post_id:
        description: "Tweet/Post ID to attach the note to"
        required: true
      note_text:
        description: "The note text to submit"
        required: true
      test_mode:
        description: "Use test_mode"
        required: false
        default: "true"

jobs:
  submit-note:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: Submit note
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_KEY_SECRET: ${{ secrets.X_API_KEY_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
        run: |
          ai-note-writer submit \
            --post-id "${{ github.event.inputs.post_id }}" \
            --note-text "${{ github.event.inputs.note_text }}" \
            --test-mode=${{ github.event.inputs.test_mode || 'true' }} \
            --evaluate=true
