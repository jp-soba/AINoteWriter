name: Automated Community Note Writer

on:
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      num_posts:
        description: "Number of eligible posts to process"
        required: false
        default: "5"
      test_mode:
        description: "Use test_mode"
        required: false
        default: "true"
      submit_notes:
        description: "Submit notes to X API"
        required: false
        default: "false"
      evaluate_before_submit:
        description: "Call evaluate_note before submit"
        required: false
        default: "true"
      enable_url_check:
        description: "Enable URL validity check before submit"
        required: false
        default: "false"
      url_check_timeout:
        description: "Timeout (seconds) for URL checks"
        required: false
        default: "5"
  # schedule:
  #   - cron: "0 * * * *"

jobs:
  run-note-writer:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: Install Claude CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Run writer
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_KEY_SECRET: ${{ secrets.X_API_KEY_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
          X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
          AI_PROVIDER: claude_agent
          AI_TIMEOUT_SEC: "300"
          AI_MODEL: ${{ vars.AI_MODEL }}
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          ai-note-writer run \
            --num-posts "${{ github.event.inputs.num_posts || '2' }}" \
            --test-mode=${{ github.event.inputs.test_mode || 'true' }} \
            --submit-notes=${{ github.event.inputs.submit_notes || 'false' }} \
            --evaluate-before-submit=${{ github.event.inputs.evaluate_before_submit || 'true' }} \
            --enable-url-check=${{ github.event.inputs.enable_url_check || 'false' }} \
            --url-check-timeout "${{ github.event.inputs.url_check_timeout || '5' }}"

      - name: Upload outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: writer-outputs
          path: outputs/
          if-no-files-found: ignore