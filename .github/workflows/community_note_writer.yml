name: Automated Community Note Writer

concurrency:
  group: note-writer
  cancel-in-progress: false

on:
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      num_posts:
        description: "Number of eligible posts to process"
        required: false
        default: "15"
      test_mode:
        description: "Use test_mode"
        required: false
        default: "true"
      submit_notes:
        description: "Submit notes to X API"
        required: false
        default: "true"
      evaluate_before_submit:
        description: "Call evaluate_note before submit"
        required: false
        default: "true"
      enable_url_check:
        description: "Enable URL validity check before submit"
        required: false
        default: "true"
      url_check_timeout:
        description: "Timeout (seconds) for URL checks"
        required: false
        default: "5"
      feed_lang:
        description: "Feed language filter (ja, all, or empty for English only)"
        required: false
        default: ""
  schedule:
    - cron: "*/30 * * * *"

jobs:
  run-note-writer:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: Install Claude CLI and MCP dependencies
        run: |
          npm install -g @anthropic-ai/claude-code
          npm install -g @sylphx/pdf-reader-mcp

      - name: Restore processed posts cache
        uses: actions/cache@v4
        with:
          path: outputs/processed_posts.json
          key: processed-posts-${{ github.run_id }}
          restore-keys: processed-posts-

      - name: Run writer
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_KEY_SECRET: ${{ secrets.X_API_KEY_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
          AI_PROVIDER: claude_agent
          AI_TIMEOUT_SEC: "300"
          AI_MODEL: ${{ vars.AI_MODEL }}
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          FEED_LANG="${{ github.event.inputs.feed_lang }}"
          FEED_LANG_ARG=""
          if [ -n "$FEED_LANG" ]; then
            FEED_LANG_ARG="--feed-lang $FEED_LANG"
          fi

          ai-note-writer run \
            --num-posts "${{ github.event.inputs.num_posts || '15' }}" \
            --test-mode=${{ github.event.inputs.test_mode || 'true' }} \
            --submit-notes=${{ github.event.inputs.submit_notes || 'true' }} \
            --evaluate-before-submit=${{ github.event.inputs.evaluate_before_submit || 'true' }} \
            --enable-url-check=${{ github.event.inputs.enable_url_check || 'true' }} \
            --url-check-timeout "${{ github.event.inputs.url_check_timeout || '5' }}" \
            $FEED_LANG_ARG

      - name: Upload outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: writer-outputs
          path: outputs/
          if-no-files-found: ignore